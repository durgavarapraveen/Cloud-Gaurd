# ──────────────────────────────────────────────────────────────
#  CloudGuard — VPC Policy Rules
#  Source : CIS Amazon Web Services Foundations Benchmark v2.0
#  Service: Amazon VPC
# ──────────────────────────────────────────────────────────────

rules:

  # ────────────────────────────────────────────
  #  FLOW LOGS
  # ────────────────────────────────────────────

  - id: CIS-VPC-01
    title: "VPC flow logs must be enabled"
    description: >
      Flow logs capture network traffic metadata.
      Required for security investigations.
    severity: HIGH
    service: vpc
    resource_type: vpc
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 3.1"
    check:
      path: "FlowLogs"
      operator: exists
    remediation: >
      Enable VPC flow logs from VPC console.
    references:
      - https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs.html


  # ────────────────────────────────────────────
  #  NETWORK ACL
  # ────────────────────────────────────────────

  - id: CIS-VPC-02
    title: "Default network ACL should not allow all traffic"
    description: >
      Default ACLs allow all inbound/outbound traffic.
      Should be restricted.
    severity: MEDIUM
    service: vpc
    resource_type: network_acl
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 5.1"
    check:
      path: "Entries"
      operator: not_contains
      value: "0.0.0.0/0"
    remediation: >
      Modify ACL rules to restrict access.
    references:
      - https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html


  # ────────────────────────────────────────────
  #  INTERNET GATEWAY
  # ────────────────────────────────────────────

  - id: CIS-VPC-03
    title: "VPC should not have unused internet gateway"
    description: >
      Unused IGWs increase attack surface.
    severity: LOW
    service: vpc
    resource_type: internet_gateway
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 5.3"
    check:
      path: "Attachments"
      operator: exists
    remediation: >
      Remove unused IGW.
    references:
      - https://docs.aws.amazon.com/vpc/latest/userguide/VPC_Internet_Gateway.html


  # ────────────────────────────────────────────
  #  SUBNET SECURITY
  # ────────────────────────────────────────────

  - id: CIS-VPC-04
    title: "Public subnets must be identified"
    description: >
      Public subnets route to internet gateway.
      Should be monitored carefully.
    severity: INFO
    service: vpc
    resource_type: subnet
    cis_reference: "Best Practice"
    check:
      path: "MapPublicIpOnLaunch"
      operator: is_false
    remediation: >
      Disable auto public IP assignment.
    references:
      - https://docs.aws.amazon.com/vpc/latest/userguide/VPC_Subnets.html


  # ────────────────────────────────────────────
  #  TAGGING
  # ────────────────────────────────────────────

  - id: CUSTOM-VPC-01
    title: "VPC must have tags"
    description: >
      All VPC resources must be tagged for ownership tracking.
    severity: LOW
    service: vpc
    resource_type: vpc
    cis_reference: "Internal Policy"
    check:
      path: "Tags"
      operator: exists
    remediation: >
      Add tags like Owner, Environment, Project.
    references: []