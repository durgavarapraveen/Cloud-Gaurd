# ──────────────────────────────────────────────────────────────
#  CloudGuard — EC2 Policy Rules
#  Source : CIS Amazon Web Services Foundations Benchmark v2.0
#  Service: Amazon EC2
# ──────────────────────────────────────────────────────────────

rules:

  # ────────────────────────────────────────────
  #  SECURITY GROUPS
  # ────────────────────────────────────────────

  - id: CIS-EC2-01
    title: "Security group must not allow SSH from 0.0.0.0/0"
    description: >
      Allowing SSH access from anywhere exposes EC2 instances to
      brute force attacks. Access should be restricted to known IP ranges.
    severity: CRITICAL
    service: ec2
    resource_type: ec2_security_group
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 4.1"
    check:
      path: "IpPermissions"
      operator: not_contains
      value: "0.0.0.0/0"
    remediation: >
      Go to EC2 Console → Security Groups →
      Edit inbound rules → Restrict SSH to corporate IP ranges.
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-security-groups.html

  - id: CIS-EC2-02
    title: "Security group must not allow RDP from 0.0.0.0/0"
    description: >
      RDP exposure allows attackers to attempt remote access.
      Restrict to trusted IP ranges only.
    severity: CRITICAL
    service: ec2
    resource_type: ec2_security_group
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 4.2"
    check:
      path: "IpPermissions"
      operator: not_contains
      value: "3389"
    remediation: >
      Remove open RDP access and restrict to trusted networks.
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-security-groups.html


  # ────────────────────────────────────────────
  #  INSTANCE SECURITY
  # ────────────────────────────────────────────

  - id: CIS-EC2-03
    title: "EC2 instance should not have public IP"
    description: >
      Public IPs increase attack surface.
      Instances should use private networking with NAT or load balancers.
    severity: HIGH
    service: ec2
    resource_type: ec2_instance
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 4.3"
    check:
      path: "PublicIpAddress"
      operator: not_exists
    remediation: >
      Disable auto assign public IP.
      Use private subnet architecture.
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-instance-addressing.html


  - id: CIS-EC2-04
    title: "EC2 instance must use IAM role"
    description: >
      IAM roles allow secure credential management.
      Avoid hardcoded credentials inside instances.
    severity: HIGH
    service: ec2
    resource_type: ec2_instance
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 1.18"
    check:
      path: "IamInstanceProfile"
      operator: exists
    remediation: >
      Attach IAM role to EC2 instance.
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use_switch-role-ec2.html


  # ────────────────────────────────────────────
  #  STORAGE
  # ────────────────────────────────────────────

  - id: CIS-EC2-05
    title: "EBS volumes must be encrypted"
    description: >
      Encryption protects sensitive data stored on EC2 volumes.
    severity: HIGH
    service: ec2
    resource_type: ebs_volume
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 2.2.1"
    check:
      path: "Encrypted"
      operator: is_true
    remediation: >
      Enable EBS encryption by default.
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSEncryption.html


  # ────────────────────────────────────────────
  #  MONITORING
  # ────────────────────────────────────────────

  - id: CIS-EC2-06
    title: "EC2 detailed monitoring should be enabled"
    description: >
      Detailed monitoring improves visibility into instance performance.
    severity: LOW
    service: ec2
    resource_type: ec2_instance
    cis_reference: "CIS AWS Foundations Benchmark v2.0 — 4.5"
    check:
      path: "Monitoring.State"
      operator: equals
      value: "enabled"
    remediation: >
      Enable detailed monitoring from EC2 console.
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/manage-detailed-monitoring.html